server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:notification-service}
  datasource:
    url: ${NOTIFICATION_DB_URL:${DB_URL:jdbc:mysql://localhost:33066/banquito_notification_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil}}
    username: ${NOTIFICATION_DB_USERNAME:${DB_USERNAME:root}}
    password: ${NOTIFICATION_DB_PASSWORD:${DB_PASSWORD:BanQuitoRoot2026!}}
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SMTP_TIMEOUT:5000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

banquito:
  internal:
    service-key: ${INTERNAL_SERVICE_KEY:BanQuitoInternalServiceKey2026ChangeMe}
  security:
    jwt:
      issuer: ${JWT_ISSUER:banquito-identity-access}
      secret: ${JWT_SECRET:BanQuitoIdentityJwtSecretKeyForDevelopmentOnlyChangeMe2026}
  grpc:
    server:
      port: ${NOTIFICATION_GRPC_PORT:9097}
  notification:
    delivery:
      mode: ${NOTIFICATION_DELIVERY_MODE:SIMULATED}
      provider: ${NOTIFICATION_PROVIDER:SMTP}
      from: ${SMTP_FROM:no-reply@banquito.com}
      reply-to: ${SMTP_REPLY_TO:}
